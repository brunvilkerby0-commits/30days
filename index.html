<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>30Days Mini App</title>
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* Design ak Koulè Drapo Cap-Vert */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            background-color: #002A54; /* Ble Fonse Cap-Vert */
            color: #FFFFFF;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            padding-bottom: 90px;
            text-align: center;
        }
        .header {
            margin-bottom: 25px;
        }
        .username-title {
            font-size: 1.2rem;
            color: #FFFFFF;
            opacity: 0.9;
        }
        .balance-card {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 25px 20px;
            margin-bottom: 25px;
            border-bottom: 4px solid #CE1126; /* Liy Wouj Cap-Vert */
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .balance-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #A0B2C6;
        }
        .balance-amount {
            font-size: 2.8rem;
            font-weight: bold;
            margin: 10px 0;
            color: #FFFFFF;
        }
        .timer-box {
            font-size: 1.8rem;
            font-weight: bold;
            margin: 15px 0 20px 0;
            color: #FFD700; /* Koulè Etwal Cap-Vert / Jaune */
            font-family: monospace;
        }
        .btn-claim {
            background-color: #009639; /* Vèt Pwofi */
            color: #FFFFFF;
            border: none;
            padding: 16px 30px;
            font-size: 1.1rem;
            border-radius: 30px;
            cursor: pointer;
            width: 100%;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-claim:active {
            transform: scale(0.98);
        }
        .btn-claim:disabled {
            background-color: #555555;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .stats-container {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 15px 20px;
            text-align: left;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .stat-row:last-child {
            border-bottom: none;
        }
        .stat-label {
            color: #A0B2C6;
        }
        .stat-value {
            font-weight: bold;
        }

        /* Meni Onglet anba a */
        .navbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #001A35;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            z-index: 1000;
        }
        .nav-item {
            color: #A0B2C6;
            text-decoration: none;
            font-weight: bold;
            font-size: 1rem;
            padding: 8px 16px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        .nav-item.active {
            color: #FFFFFF;
            background-color: #CE1126; /* Wouj pou Onglet Aktif */
        }
    </style>
</head>
<body>

    <div class="header">
        <h3 class="username-title" id="user-display">Chargement...</h3>
    </div>

    <!-- Kat Prensipal Balans ak Timer -->
    <div class="balance-card">
        <div class="balance-label">Gains disponibles</div>
        <div class="balance-amount" id="balance-display">$0.00</div>
        
        <div class="timer-box" id="timer-display">24:00:00</div>
        <button class="btn-claim" id="claim-btn" onclick="claimGains()">Réclamer mes gains</button>
    </div>

    <!-- Estatistik Envestisman -->
    <div class="stats-container">
        <div class="stat-row">
            <span class="stat-label">Taux Investi:</span>
            <span class="stat-value" id="taux-display">$0.00</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Total Profit (30j):</span>
            <span class="stat-value" id="profit-display">$0.00</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">Gains Étirés:</span>
            <span class="stat-value" id="etires-display">$0.00</span>
        </div>
    </div>

    <!-- Meni 3 Onglet yo -->
    <div class="navbar">
        <a href="#" class="nav-item active" onclick="switchTab(this, 'struc')">Struc</a>
        <a href="#" class="nav-item" onclick="switchTab(this, 'pro')">Pro</a>
        <a href="#" class="nav-item" onclick="switchTab(this, 'more')">More</a>
    </div>

    <!-- Firebase Script Modular (ES6) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Konfigirasyon Firebase ou an
        const firebaseConfig = {
            databaseURL: "https://days-51e9b-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Rekipere enfòmasyon itilizatè a nan Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe?.user || { id: "test_user_123", username: "UtilisateurDemo" };
        const userId = user.id.toString();
        const username = user.username || "Utilisateur";

        document.getElementById('user-display').innerText = `@${username}`;

        // Fonksyon pou senkronize oswa kreye itilizatè a nan Firebase
        async function syncUser() {
            const userRef = ref(db, `users/${userId}`);
            try {
                const snapshot = await get(userRef);
                if (!snapshot.exists()) {
                    // Si l pa egziste, nou kreye estrikti a otomatikman
                    const newUser = {
                        profile: {
                            username: username,
                            telegram_id: userId,
                            language: "fr",
                            joined_at: Math.floor(Date.now() / 1000)
                        },
                        investment: {
                            taux_investi: 0.00,
                            current_percentage: 0.02,
                            balance_profi: 0.00,
                            gains_etires: 0.00,
                            total_profit_30_days: 0.00,
                            active: false
                        },
                        timer_control: {
                            activated_at: 0,
                            next_claim_time: 0,
                            days_remaining: 30,
                            claim_status: "waiting"
                        },
                        referral: {
                            referred_by: "null",
                            total_invited: 0,
                            total_team_revenue: 0.00
                        }
                    };
                    await set(userRef, newUser);
                    updateUI(newUser);
                } else {
                    updateUI(snapshot.val());
                }
            } catch (error) {
                console.error("Erreur Firebase:", error);
            }
        }

        // Mizajou afichaj done yo nan paj la
        function updateUI(userData) {
            const inv = userData.investment || {};
            document.getElementById('balance-display').innerText = `$${(inv.balance_profi || 0).toFixed(2)}`;
            document.getElementById('taux-display').innerText = `$${(inv.taux_investi || 0).toFixed(2)}`;
            document.getElementById('profit-display').innerText = `$${(inv.total_profit_30_days || 0).toFixed(2)}`;
            document.getElementById('etires-display').innerText = `$${(inv.gains_etires || 0).toFixed(2)}`;
        }
        // Chanje ant onglet yo
        window.switchTab = function(element, tabName) {
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            element.classList.add('active');
            // Ou ka ajoute lojik afichaj diferan paj la si w vle pita
        };

        // Reklame pwofi (Claim)
        window.claimGains = async function() {
            alert("Lojik claim nan ap kalkile pwofi 24h yo!");
        };

        // Lansman otomatik lè paj la louvri
        syncUser();
    </script>
</body>
</html>
